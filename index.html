<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM Reference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #1a2332;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .book-icon {
            width: 30px;
            height: 30px;
        }
        
        .search-box {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 14px;
            color: #666;
        }
        
        .search-box input::placeholder {
            color: #999;
        }
        
        .section-label {
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .sections {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .section-card {
            background: #2d3e52;
            border: 1px solid #3d4e66;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-card:hover {
            background: #354859;
            border-color: #4a5f7f;
            transform: translateX(5px);
        }
        
        .section-card.active {
            background: #3d4e66;
            border-color: #5a7f9f;
        }
        
        .section-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .section-icon {
            font-size: 24px;
            color: #4fa3ff;
        }
        
        .section-info h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .section-info p {
            font-size: 13px;
            opacity: 0.7;
        }
        
        .arrow {
            font-size: 20px;
            opacity: 0.6;
            color: #4fa3ff;
        }
        
        .admin-btn {
            width: 100%;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        
        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }
        
        .admin-btn:active {
            transform: translateY(0);
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s;
        }
        
        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: #2d3e52;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: slideUp 0.3s;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: white;
        }
        
        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #3d4e66;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
            background: #354859;
            color: white;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: #4fa3ff;
        }
        
        .modal-input.error {
            border-color: #ef4444;
            animation: shake 0.3s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .modal-btn.confirm {
            background: #a855f7;
            color: white;
        }
        
        .modal-btn.confirm:hover {
            background: #9333ea;
        }
        
        .modal-btn.cancel {
            background: #3d4e66;
            color: #e5e7eb;
        }
        
        .modal-btn.cancel:hover {
            background: #4a5f7f;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* Section Detail View */
        .section-detail {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #1a2332;
            color: white;
            animation: slideInRight 0.3s;
        }
        
        .section-detail.show {
            display: flex;
            flex-direction: column;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }
        
        .detail-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3d4e66;
        }
        
        .detail-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        .close-btn {
            background: #2d3e52;
            border: 1px solid #3d4e66;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: #354859;
            border-color: #4a5f7f;
        }
        
        .detail-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .add-data-btn {
            background: #4fa3ff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            width: 100%;
            justify-content: center;
        }
        
        .add-data-btn:hover {
            background: #3f8cd9;
        }
        
        .data-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .data-item {
            background: #2d3e52;
            border: 1px solid #3d4e66;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        
        .data-item-info {
            flex: 1;
        }
        
        .data-item-name {
            font-size: 16px;
            font-weight: 600;
            color: #4fa3ff;
            margin-bottom: 5px;
        }
        
        .data-item-details {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .data-item-details div {
            margin-bottom: 3px;
        }
        
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        
        .delete-btn:hover {
            background: #dc2626;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.6;
        }
        
        /* Add Data Form Modal */
        .add-data-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.3s;
        }
        
        .add-data-modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .add-data-form {
            background: #2d3e52;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: slideUp 0.3s;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #4fa3ff;
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #3d4e66;
            border-radius: 6px;
            background: #354859;
            color: white;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4fa3ff;
        }
        
        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .form-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .form-btn.save {
            background: #4fa3ff;
            color: white;
        }
        
        .form-btn.save:hover {
            background: #3f8cd9;
        }
        
        .form-btn.cancel {
            background: #3d4e66;
            color: #e5e7eb;
        }
        
        .form-btn.cancel:hover {
            background: #4a5f7f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="book-icon">📖</span>
                <span>AMM Reference</span>
            </h1>
        </div>
        
        <div class="search-box">
            <input type="text" placeholder="Search all references...">
        </div>
        
        <div class="section-label">Quick Reference</div>
        
        <div class="sections">
            <div class="section-card" onclick="openSection(321)">
                <div class="section-content">
                    <div class="section-icon">📄</div>
                    <div class="section-info">
                        <h2>321</h2>
                        <p>3 references</p>
                    </div>
                </div>
                <div class="arrow">›</div>
            </div>
            
            <div class="section-card" onclick="openSection(330)">
                <div class="section-content">
                    <div class="section-icon">📄</div>
                    <div class="section-info">
                        <h2>330</h2>
                        <p>3 references</p>
                    </div>
                </div>
                <div class="arrow">›</div>
            </div>
            
            <div class="section-card" onclick="openSection(777)">
                <div class="section-content">
                    <div class="section-icon">📄</div>
                    <div class="section-info">
                        <h2>777</h2>
                        <p>2 references</p>
                    </div>
                </div>
                <div class="arrow">›</div>
            </div>
            
            <div class="section-card" onclick="openSection(999)">
                <div class="section-content">
                    <div class="section-icon">📄</div>
                    <div class="section-info">
                        <h2>999</h2>
                        <p>5 references</p>
                    </div>
                </div>
                <div class="arrow">›</div>
            </div>
        </div>
        
        <button class="admin-btn" onclick="openAdminPanel()">🔒 Admin Panel</button>
    </div>
    
    <!-- Admin Panel Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Enter Admin Password</div>
            <input type="password" id="passwordInput" class="modal-input" placeholder="Enter password..." onkeypress="handleKeyPress(event)">
            <div class="error-message" id="errorMessage">Incorrect password! Try again.</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeAdminPanel()">Cancel</button>
                <button class="modal-btn confirm" onclick="checkPassword()">Confirm</button>
            </div>
        </div>
    </div>
    
    <!-- Section Detail View -->
    <div id="sectionDetail" class="section-detail">
        <div class="detail-header">
            <div class="detail-title" id="detailTitle">Section 321</div>
            <button class="close-btn" onclick="closeSection()">✕</button>
        </div>
        <div class="detail-content">
            <button class="add-data-btn" onclick="openAddDataForm()">➕ Add Data</button>
            <div id="dataList" class="data-list">
                <div class="empty-state">No data yet. Click "Add Data" to get started!</div>
            </div>
        </div>
    </div>
    
    <!-- Add Data Form Modal -->
    <div id="addDataModal" class="add-data-modal">
        <div class="add-data-form">
            <div class="modal-header">Add New Data</div>
            <form onsubmit="saveData(event)">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="amm1">AMM 1</label>
                    <input type="text" id="amm1" required>
                </div>
                <div class="form-group">
                    <label for="amm2">AMM 2</label>
                    <input type="text" id="amm2" required>
                </div>
                <div class="form-group">
                    <label for="pn">P/N</label>
                    <input type="text" id="pn" required>
                </div>
                <div class="form-buttons">
                    <button type="button" class="form-btn cancel" onclick="closeAddDataForm()">Cancel</button>
                    <button type="submit" class="form-btn save">Save</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const ADMIN_PASSWORD = "ZZ5577";
        let currentSection = null;
        
        const sectionData = {
            321: { title: "Section 321" },
            330: { title: "Section 330" },
            777: { title: "Section 777" },
            999: { title: "Section 999" }
        };
        
        // Initialize localStorage
        function initializeData() {
            if (!localStorage.getItem('ammData')) {
                const defaultData = {
                    321: [],
                    330: [],
                    777: [],
                    999: []
                };
                localStorage.setItem('ammData', JSON.stringify(defaultData));
            }
        }
        
        // Get all data
        function getAllData() {
            return JSON.parse(localStorage.getItem('ammData') || '{}');
        }
        
        // Get section data
        function getSectionData(sectionId) {
            const allData = getAllData();
            return allData[sectionId] || [];
        }
        
        // Save data to localStorage
        function saveDataToStorage(sectionId, dataArray) {
            const allData = getAllData();
            allData[sectionId] = dataArray;
            localStorage.setItem('ammData', JSON.stringify(allData));
        }
        
        // Add new data
        function addData(sectionId, data) {
            const sectionData = getSectionData(sectionId);
            sectionData.push({
                id: Date.now(),
                name: data.name,
                amm1: data.amm1,
                amm2: data.amm2,
                pn: data.pn
            });
            saveDataToStorage(sectionId, sectionData);
        }
        
        // Delete data
        function deleteData(sectionId, dataId) {
            let sectionData = getSectionData(sectionId);
            sectionData = sectionData.filter(item => item.id !== dataId);
            saveDataToStorage(sectionId, sectionData);
            displaySectionData(sectionId);
        }
        
        // Display section data
        function displaySectionData(sectionId) {
            const dataList = document.getElementById('dataList');
            const sectionDataArray = getSectionData(sectionId);
            
            if (sectionDataArray.length === 0) {
                dataList.innerHTML = '<div class="empty-state">No data yet. Click "Add Data" to get started!</div>';
                return;
            }
            
            dataList.innerHTML = sectionDataArray.map(item => `
                <div class="data-item">
                    <div class="data-item-info">
                        <div class="data-item-name">${escapeHtml(item.name)}</div>
                        <div class="data-item-details">
                            <div><strong>AMM 1:</strong> ${escapeHtml(item.amm1)}</div>
                            <div><strong>AMM 2:</strong> ${escapeHtml(item.amm2)}</div>
                            <div><strong>P/N:</strong> ${escapeHtml(item.pn)}</div>
                        </div>
                    </div>
                    <button class="delete-btn" onclick="deleteData(${sectionId}, ${item.id})">🗑️</button>
                </div>
            `).join('');
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        function openAdminPanel() {
            document.getElementById("adminModal").classList.add("show");
            document.getElementById("passwordInput").focus();
            document.getElementById("errorMessage").classList.remove("show");
            document.getElementById("passwordInput").classList.remove("error");
        }
        
        function closeAdminPanel() {
            document.getElementById("adminModal").classList.remove("show");
            document.getElementById("passwordInput").value = "";
            document.getElementById("errorMessage").classList.remove("show");
            document.getElementById("passwordInput").classList.remove("error");
        }
        
        function checkPassword() {
            const password = document.getElementById("passwordInput").value;
            
            if (password === ADMIN_PASSWORD) {
                alert("✅ Admin access granted! Welcome to the Admin Panel.");
                closeAdminPanel();
            } else {
                document.getElementById("errorMessage").classList.add("show");
                document.getElementById("passwordInput").classList.add("error");
                document.getElementById("passwordInput").value = "";
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        }
        
        function openSection(sectionId) {
            currentSection = sectionId;
            const data = sectionData[sectionId];
            document.getElementById("detailTitle").textContent = data.title;
            document.getElementById("sectionDetail").classList.add("show");
            displaySectionData(sectionId);
        }
        
        function closeSection() {
            document.getElementById("sectionDetail").classList.remove("show");
            currentSection = null;
        }
        
        function openAddDataForm() {
            document.getElementById("addDataModal").classList.add("show");
            document.getElementById("name").focus();
        }
        
        function closeAddDataForm() {
            document.getElementById("addDataModal").classList.remove("show");
            document.getElementById("name").value = "";
            document.getElementById("amm1").value = "";
            document.getElementById("amm2").value = "";
            document.getElementById("pn").value = "";
        }
        
        function saveData(event) {
            event.preventDefault();
            
            const data = {
                name: document.getElementById("name").value,
                amm1: document.getElementById("amm1").value,
                amm2: document.getElementById("amm2").value,
                pn: document.getElementById("pn").value
            };
            
            if (currentSection) {
                addData(currentSection, data);
                closeAddDataForm();
                displaySectionData(currentSection);
            }
        }
        
        // Close modals when clicking outside
        window.onclick = function(event) {
            const adminModal = document.getElementById("adminModal");
            const addDataModal = document.getElementById("addDataModal");
            
            if (event.target === adminModal) {
                closeAdminPanel();
            }
            if (event.target === addDataModal) {
                closeAddDataForm();
            }
        }
        
        // Close detail view when clicking outside
        document.getElementById("sectionDetail").addEventListener("click", function(event) {
            if (event.target === this) {
                closeSection();
            }
        });
        
        // Initialize on page load
        window.addEventListener('load', function() {
            initializeData();
        });
    </script>
</body>
</html>
